<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My Todo List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task..."
                class="task-input"
            >
            <input 
                type="date" 
                id="dueDateInput" 
                class="due-date-input"
            >
            <select id="categoryInput" class="category-input">
                <option value="Work">Work</option>
                <option value="Personal">Personal</option>
                <option value="Shopping">Shopping</option>
                <option value="Health">Health</option>
                <option value="Other">Other</option>
            </select>
            <button id="addBtn" class="add-btn">Add Task</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="stats">
            <span>Total: <strong id="totalCount">0</strong></span>
            <span>Completed: <strong id="completedCount">0</strong></span>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <div id="emptyState" class="empty-state">
            <p>No tasks yet. Add one to get started! 🚀</p>
        </div>

        <button id="clearCompleted" class="clear-btn">Clear Completed</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
